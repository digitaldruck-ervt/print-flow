function saveForm() {
  const customer = document.getElementById("f-customer").value.trim();
  const format   = document.getElementById("f-format").value.trim();
  const liefer   = document.getElementById("f-liefer").value;
  if (!customer || !format) return;

  const data = {
    customer, mengeFormat: format,
    auftragsnr: document.getElementById("f-auftragsnr").value.trim(),
    dateipfad:  document.getElementById("f-dateipfad").value.trim(),
    startDate:  document.getElementById("f-start").value,
    lieferdatum: liefer,
    fixtermin:  document.getElementById("f-fix").checked,
    material:   document.getElementById("f-material").value,
    status:     document.getElementById("f-status").value,
    druckdaten: document.getElementById("f-druckdaten").value,

    notizen:    document.getElementById("f-notizen").value.trim(),
    konfektion: {
      oben:   document.getElementById("f-k-oben").value,
      unten:  document.getElementById("f-k-unten").value,
      links:  document.getElementById("f-k-links").value,
      rechts: document.getElementById("f-k-rechts").value,
    }
  };

  if (editingId) {
    const idx = orders.findIndex(x => x.id === editingId);
    orders[idx] = {...orders[idx], ...data};
  } else {
    orders.unshift({id:`AU-2024-0${nextNum++}`, ...data});
  }

  closeForm();
  renderStatusNav(); renderStats(); applyFilters();
  if (currentTab === "kalender") renderCalendar();
}

