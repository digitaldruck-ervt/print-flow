  let badges = `<span style="font-family:monospace;font-size:11px;color:#6B7280;background:#F3F4F6;padding:2px 8px;border-radius:3px">${esc(o.id)}</span>`;
  badges += statBadge(o.status);
  if (o.fixtermin) badges += `<span style="font-size:10px;font-weight:700;color:#991B1B;background:#FEF2F2;border:1px solid #FECACA;border-radius:3px;padding:1px 7px">FIXTERMIN</span>`;
  document.getElementById("detail-badges").innerHTML = badges;
  document.getElementById("detail-customer").textContent = o.customer;

  const infos = [
    {l:"Startdatum",   v:fmtDate(o.startDate)},
    {l:"Lieferdatum",  v:`<span style="color:${o.fixtermin?"#991B1B":"#111"};font-weight:600">${fmtDate(o.lieferdatum)}</span>`},
    {l:"Format",       v:esc(o.mengeFormat)},
    {l:"Material",     v:matBadge(o.material)},
    {l:"Druckdaten",   v:ddBadge(o.druckdaten)},

    ...(o.auftragsnr ? [{l:"Auftragsnr.",  v:`<span style="font-family:monospace;font-size:12px;color:#D4006A;background:#FFF0F7;padding:2px 7px;border-radius:3px">${esc(o.auftragsnr)}</span>`}] : []),
    ...(o.dateipfad  ? [{l:"Dateipfad",    v:`<span style="font-family:monospace;font-size:11px;color:#374151;word-break:break-all">${esc(o.dateipfad)}</span>`}]  : []),
  ];
  document.getElementById("detail-info-grid").innerHTML = infos.map(i =>
    `<div class="info-item"><div class="info-lbl">${i.l}</div><div class="info-val">${i.v}</div></div>`
  ).join("");

  document.getElementById("detail-konf").innerHTML = [["Oben","oben"],["Unten","unten"],["Links","links"],["Rechts","rechts"]].map(([lbl,key])=>
    `<tr><td class="kl">${lbl}</td><td class="kv">${esc(o.konfektion[key]||"—")}</td></tr>`
  ).join("");

  const ns = document.getElementById("detail-notes-section");
  if (o.notizen) { ns.classList.remove("hidden"); document.getElementById("detail-notes").textContent = o.notizen; }
  else ns.classList.add("hidden");

  const si = STATUS_LIST.indexOf(o.status);
  const nextStat = si < STATUS_LIST.length-1 ? STATUS_LIST[si+1] : null;
  document.getElementById("detail-actions").innerHTML = `
    <div>${nextStat
      ? `<button class="btn btn-primary" onclick="advanceStatus('${o.id}','${nextStat}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Weiter: ${esc(nextStat)}</button>`
      : `<span style="font-size:12px;color:#9CA3AF">Auftrag abgeschlossen</span>`
    }</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary" onclick="openEditFromDetail()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Bearbeiten
      </button>
      <button class="btn btn-danger" onclick="askDeleteFromDetail('${o.id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#991B1B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        Löschen
      </button>
    </div>`;

  document.getElementById("detail-overlay").classList.remove("hidden");
}

function closeDetail() { document.getElementById("detail-overlay").classList.add("hidden"); detailId = null; }
function closeDetailIfBg(e) { if (e.target === e.currentTarget) closeDetail(); }
function advanceStatus(id, ns) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  if (ns === "Abgeschlossen") {
    o.status = "Abgeschlossen";
    archivedOrders.unshift({...o, archivedAt: new Date().toISOString().slice(0,10)});
    orders = orders.filter(x => x.id !== id);
    closeDetail();
  } else {
    o.status = ns;
    if (detailId === id) openDetail(id);
  }
  renderStatusNav(); renderStats(); applyFilters();
  if (currentTab === "kalender") renderCalendar();
  if (currentTab === "archiv") renderArchiv();
}
function openEditFromDetail() { const id = detailId; closeDetail(); openEditForm(id); }
function askDeleteFromDetail(id) { closeDetail(); askDelete(id); }

