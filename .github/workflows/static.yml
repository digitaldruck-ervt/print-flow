  {id:"AU-2024-0893",startDate:"2024-07-02",customer:"Event Solutions AG",    status:"In Planung",  material:"Mesh",         druckdaten:"Ausstehend", mengeFormat:"1 Stk. 500x400cm",lieferdatum:"2024-07-12",fixtermin:false,machine:"M1",konfektion:{oben:"Hohlsaum 80mm",unten:"Hohlsaum 80mm",links:"Ösen 100cm Abstand",rechts:"Ösen 100cm Abstand"},notizen:"Außenbereich – Mesh 30% Transparenz Panaflex."},
