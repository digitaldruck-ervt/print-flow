    tbody.innerHTML = `<tr><td colspan="7" style="padding:48px;text-align:center;color:#9CA3AF;font-size:14px;">Keine archivierten Aufträge.</td></tr>`;
    return;
  }
  tbody.innerHTML = archivedOrders.map(o => `
    <tr style="background:#F9FAFB;opacity:0.85;">
      <td><span class="td-id">${esc(o.id)}</span>${o.auftragsnr?` <span style="font-family:monospace;font-size:10px;color:#9CA3AF">${esc(o.auftragsnr)}</span>`:""}</td>
      <td><span class="td-date">${fmtShort(o.archivedAt)}</span></td>
      <td><span class="td-customer">${esc(o.customer)}</span></td>
      <td>${matBadge(o.material)}</td>
      <td><span class="td-fmt">${esc(o.mengeFormat)}</span></td>
      <td><span style="font-size:12px;color:#6B7280">${fmtShort(o.lieferdatum)}</span></td>
      <td style="text-align:right" onclick="event.stopPropagation()">
        <button class="act-btn act-edit" title="Wiederherstellen" onclick="restoreFromArchiv('${o.id}')" style="border-color:#D1FAE5">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#065F46" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8M3 3v5h5"/></svg>
        </button>
        <button class="act-btn act-del" title="Endgültig löschen" onclick="deleteFromArchiv('${o.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
      </td>
    </tr>`).join("");
}

function restoreFromArchiv(id) {
  const idx = archivedOrders.findIndex(x => x.id === id);
  if (idx === -1) return;
  const o = {...archivedOrders[idx], status:"In Planung"};
  delete o.archivedAt;
  orders.unshift(o);
  archivedOrders.splice(idx, 1);
  renderArchiv();
  renderStatusNav();
  renderStats();
  applyFilters();
}

function deleteFromArchiv(id) {
  archivedOrders = archivedOrders.filter(x => x.id !== id);
  renderArchiv();
  const navCnt = document.getElementById("nav-archiv-cnt");
  if (navCnt) navCnt.textContent = archivedOrders.length;
}

function clearArchiv() {
  if (!archivedOrders.length) return;
  if (!confirm("Alle " + archivedOrders.length + " Archiv-Einträge endgültig löschen?")) return;
  archivedOrders = [];
  renderArchiv();
  const navCnt = document.getElementById("nav-archiv-cnt");
  if (navCnt) navCnt.textContent = 0;
}

// ── INIT ───────────────────────────────────────────────────────────────────────
// Move pre-existing "Abgeschlossen" orders to archive on load
orders = orders.filter(o => {
  if (o.status === "Abgeschlossen") {
    archivedOrders.push({...o, archivedAt: o.lieferdatum || o.startDate});
    return false;
  }
  return true;
});
initCal();
renderStatusNav();
renderStats();
applyFilters();
</script>
</body>
</html>
