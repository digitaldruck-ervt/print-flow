<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintFlow · digitaldruck-er</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
   ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #D4006A; --brand-dark: #A8004F; --brand-light: #FFF0F7;
    --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
    --gray-300: #D1D5DB; --gray-400: #9CA3AF; --gray-500: #6B7280;
    --gray-700: #374151; --gray-900: #111827;
    --font: 'IBM Plex Sans', sans-serif; --mono: 'IBM Plex Mono', monospace;
  }
  html, body { height: 100%; }
  body { font-family: var(--font); background: #F4F5F7; color: var(--gray-900); font-size: 13px; line-height: 1.5; }
  button { font-family: var(--font); cursor: pointer; }
  input, select, textarea { font-family: var(--font); font-size: 13px; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 10px; }

  /* LAYOUT */
  #app { display: flex; min-height: 100vh; }
  aside {
    width: 210px; flex-shrink: 0; background: #fff;
    border-right: 1px solid var(--gray-200);
    position: fixed; top: 0; left: 0; height: 100vh;
    display: flex; flex-direction: column; z-index: 20; overflow-y: auto;
  }
  #main { margin-left: 210px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  header {
    background: #fff; border-bottom: 1px solid var(--gray-200);
    padding: 10px 22px; display: flex; align-items: center;
    gap: 10px; position: sticky; top: 0; z-index: 10;
  }
  #content { padding: 20px 22px; flex: 1; }

  /* SIDEBAR */
  .logo-wrap { padding: 15px 16px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; border-radius: 4px; background: var(--brand); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-name { font-size: 13px; font-weight: 700; color: var(--gray-900); line-height: 1.2; }
  .logo-sub  { font-size: 10px; color: var(--brand); font-weight: 600; letter-spacing: 0.02em; }
  nav { padding: 8px; flex: 1; }
  .nav-section { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; color: var(--gray-400); padding: 6px 8px 4px; text-transform: uppercase; }
  .nav-btn {
    width: 100%; display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 4px; border: none;
    background: transparent; color: var(--gray-700);
    font-size: 13px; font-weight: 400; cursor: pointer; text-align: left; transition: background 0.1s;
  }
  .nav-btn:hover { background: var(--gray-100); }
  .nav-btn.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }
  .nav-btn .badge {
    margin-left: auto; border-radius: 20px; padding: 0 7px;
    font-size: 10px; font-weight: 700; line-height: 17px;
    background: var(--gray-100); color: var(--gray-500);
  }
  .nav-btn.active .badge { background: rgba(212,0,106,0.1); color: var(--brand); }
  .nav-status-btn {
    width: 100%; display: flex; align-items: center; gap: 7px;
    padding: 6px 10px; border-radius: 4px; border: none;
    background: transparent; color: var(--gray-700);
    font-size: 12px; cursor: pointer; text-align: left; transition: background 0.1s;
  }
  .nav-status-btn:hover { background: var(--gray-100); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .nav-cnt { margin-left: auto; color: var(--gray-400); font-size: 11px; }
  .sidebar-footer { padding: 10px 16px; border-top: 1px solid var(--gray-100); font-size: 10px; color: var(--gray-400); }

  /* TOPBAR */
  .search-wrap { position: relative; flex: 1; max-width: 360px; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); pointer-events: none; }
  .search-input {
    width: 100%; padding: 7px 10px 7px 30px;
    border: 1px solid var(--gray-300); border-radius: 4px;
    font-size: 13px; color: var(--gray-900); background: var(--gray-50); outline: none;
  }
  .search-input:focus { border-color: var(--brand); }
  .topbar-select { font-size: 12px; border: 1px solid var(--gray-300); border-radius: 4px; padding: 7px 10px; color: var(--gray-700); background: #fff; cursor: pointer; outline: none; }
  .filter-clear-btn { font-size: 12px; color: var(--gray-500); background: none; border: 1px solid var(--gray-300); border-radius: 4px; padding: 7px 10px; cursor: pointer; white-space: nowrap; }
  .filter-clear-btn:hover { background: var(--gray-100); }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 15px; border-radius: 4px; border: 1px solid; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.1s; white-space: nowrap; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary   { background: var(--brand); color: #fff; border-color: var(--brand); }
  .btn-secondary { background: #fff; color: var(--gray-700); border-color: var(--gray-300); }
  .btn-danger    { background: #FEF2F2; color: #991B1B; border-color: #FECACA; }
  .btn-sm        { padding: 5px 11px; font-size: 11px; }
  .btn-ghost     { background: transparent; color: var(--gray-500); border-color: transparent; padding: 6px 10px; }
  .btn-ghost:hover { background: var(--gray-100); opacity: 1; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 18px; }
  .stat-card { background: #fff; border: 1px solid var(--gray-200); border-radius: 6px; padding: 13px 15px; display: flex; align-items: center; gap: 11px; }
  .stat-icon { width: 34px; height: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stat-num { font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

  /* TABLE */
  .table-wrap { background: #fff; border: 1px solid var(--gray-200); border-radius: 6px; overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--gray-50); border-bottom: 1px solid var(--gray-200); }
  th { padding: 9px 13px; text-align: left; color: var(--gray-500); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--gray-700); }
  th .th-inner { display: inline-flex; align-items: center; gap: 4px; }
  tbody tr { border-bottom: 1px solid var(--gray-100); transition: background 0.08s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FFF5FA; }
  td { padding: 10px 13px; color: var(--gray-700); vertical-align: middle; }
  .td-id { font-family: var(--mono); font-size: 11px; color: var(--brand); background: var(--brand-light); padding: 2px 7px; border-radius: 3px; }
  .td-customer { font-weight: 600; color: var(--gray-900); max-width: 155px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .td-date { font-size: 12px; color: var(--gray-500); white-space: nowrap; }
  .td-fmt  { font-size: 12px; white-space: nowrap; }
  .td-fix-y { background:#FEF2F2; color:#991B1B; border-radius:3px; padding:2px 7px; font-size:10px; font-weight:700; }
  .td-fix-n { color: var(--gray-300); }
  .act-btn { background: none; border-radius: 4px; padding: 4px 7px; cursor: pointer; display: inline-flex; align-items: center; transition: opacity 0.1s; }
  .act-btn:hover { opacity: 0.65; }
  .act-edit { border: 1px solid var(--gray-200); margin-right: 4px; }
  .act-del  { border: 1px solid #FECACA; }
  .table-footer { padding: 7px 14px; border-top: 1px solid var(--gray-100); background: var(--gray-50); font-size: 11px; color: var(--gray-400); }

  /* BADGES */
  .badge-mat, .badge-stat, .badge-dd { display: inline-flex; align-items: center; gap: 5px; border-radius: 3px; padding: 2px 8px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-mat { border: 1px solid; }

  /* PAGE TITLE */
  .page-title { font-size: 17px; font-weight: 700; color: var(--gray-900); }
  .page-sub   { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
  .page-header { margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }

  /* MODAL */
  .overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.42); padding: 16px; }
  .modal { background: #fff; border-radius: 6px; width: 100%; box-shadow: 0 20px 56px rgba(0,0,0,0.18); display: flex; flex-direction: column; }
  .modal-hd { padding: 15px 22px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; background: var(--gray-50); flex-shrink: 0; }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-sub   { font-size: 11px; color: var(--gray-400); margin-top: 1px; font-family: var(--mono); }
  .modal-close { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; color: var(--gray-500); }
  .modal-body  { padding: 18px 22px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .modal-ft    { padding: 12px 22px; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 8px; background: var(--gray-50); flex-shrink: 0; }

  /* FORM */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .field  { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; }
  .field label .req { color: var(--brand); margin-left: 2px; }
  .field input, .field select, .field textarea { border: 1px solid var(--gray-300); border-radius: 4px; padding: 7px 10px; font-size: 13px; color: var(--gray-900); background: #fff; outline: none; width: 100%; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand); }
  .field textarea { resize: vertical; }
  .field .hint { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; height: 34px; }
  .checkbox-row input { width: 15px; height: 15px; accent-color: var(--brand); cursor: pointer; flex-shrink: 0; }
  .checkbox-row label { font-size: 13px; color: var(--gray-700); cursor: pointer; font-weight: 500; }
  .section-sep { border: none; border-top: 1px solid var(--gray-100); margin: 4px 0; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gray-400); display: flex; align-items: center; gap: 5px; margin-bottom: 10px; }

  /* DETAIL MODAL */
  .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; row-gap: 12px; }
  .info-item .info-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gray-400); margin-bottom: 5px; }
  .info-item .info-val { font-size: 13px; }
  .konf-table { width: 100%; border-collapse: collapse; }
  .konf-table td { padding: 6px 0; vertical-align: top; }
  .konf-table .kl { width: 55px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-400); }
  .konf-table .kv { font-size: 13px; color: var(--gray-700); font-weight: 500; border-bottom: 1px solid #F9FAFB; }
  .note-box { font-size: 13px; color: var(--gray-700); line-height: 1.65; padding: 10px 14px; background: var(--gray-50); border-left: 3px solid var(--brand); border-radius: 0 4px 4px 0; }
  .detail-actions { padding: 12px 22px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .detail-section { padding: 14px 22px; border-bottom: 1px solid var(--gray-100); }

  /* CONFIRM */
  .confirm-icon { width: 36px; height: 36px; border-radius: 50%; background: #FEF2F2; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* ── CALENDAR ── */
  .cal-wrap { background: #fff; border: 1px solid var(--gray-200); border-radius: 6px; overflow: hidden; }
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--gray-200); background: var(--gray-50);
  }
  .cal-month-label { font-size: 15px; font-weight: 700; color: var(--gray-900); }
  .cal-nav { display: flex; gap: 4px; }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--gray-200);
  }
  .cal-wd {
    padding: 8px 0; text-align: center;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--gray-400);
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell {
    min-height: 96px; padding: 6px; border-right: 1px solid var(--gray-100);
    border-bottom: 1px solid var(--gray-100); vertical-align: top;
    position: relative;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.other-month .cal-day-num { color: var(--gray-300); }
  .cal-cell.today { background: #FFFBFB; }
  .cal-cell.today .cal-day-num {
    background: var(--brand); color: #fff;
    width: 22px; height: 22px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .cal-day-num { font-size: 11px; font-weight: 600; color: var(--gray-700); margin-bottom: 4px; display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center; }
  .cal-event {
    display: block; margin-bottom: 2px; padding: 2px 6px;
    border-radius: 3px; font-size: 10px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer; border-left: 2px solid transparent;
  }
  .cal-event:hover { opacity: 0.8; }
  .cal-more { font-size: 10px; color: var(--gray-400); cursor: pointer; padding: 1px 4px; }
  .cal-more:hover { color: var(--brand); }
  .cal-today-btn { font-size: 12px; }

  /* EVENT DETAIL POPUP */
  .event-popup {
    position: fixed; z-index: 150; background: #fff;
    border: 1px solid var(--gray-200); border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 14px 16px; min-width: 240px; max-width: 300px;
  }
  .event-popup-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--gray-900); }
  .event-popup-row   { display: flex; gap: 8px; margin-bottom: 4px; align-items: center; }
  .event-popup-lbl   { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-400); width: 64px; flex-shrink: 0; }
  .event-popup-val   { font-size: 12px; color: var(--gray-700); }
  .event-popup-close { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; padding: 2px; display: flex; }

  /* HOLIDAY */
  .cal-holiday {
    display: block; margin-bottom: 2px; padding: 2px 5px;
    border-radius: 3px; font-size: 10px; font-weight: 700;
    color: #991B1B; background: #FEE2E2;
    border-left: 2px solid #EF4444;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .hidden { display: none !important; }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .detail-info-grid { grid-template-columns: 1fr 1fr; }
    .cal-cell { min-height: 72px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <aside>
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
      </div>
      <div>
        <div class="logo-name">PrintFlow</div>
        <div class="logo-sub">digitaldruck-er</div>
      </div>
    </div>

    <nav>
      <div class="nav-section">Menü</div>
      <button class="nav-btn active" onclick="setTab('auftraege')" id="nav-auftraege">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Aufträge <span class="badge" id="nav-cnt">7</span>
      </button>
      <button class="nav-btn" onclick="setTab('kalender')" id="nav-kalender">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z"/></svg>
        Kalender
      </button>
      <button class="nav-btn" onclick="setTab('archiv')" id="nav-archiv">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/></svg>
        Archiv <span class="badge" id="nav-archiv-cnt">0</span>
      </button>

      <div class="nav-section" style="margin-top:8px;">Nach Status</div>
      <div id="status-nav"></div>
    </nav>

    <div class="sidebar-footer">PrintFlow · digitaldruck-er.de</div>
  </aside>

  <!-- MAIN -->
  <div id="main">
    <header>
      <div class="search-wrap" id="search-area">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
        <input class="search-input" id="search-input" type="text" placeholder="Auftrag, Kunde oder Material …" oninput="applyFilters()">
      </div>
      <select class="topbar-select" id="filter-mat" onchange="applyFilters()">
        <option>Alle</option>
        <option>Anderes Material</option><option>Dekotex Subil</option><option>Backlit Subil</option><option>Blockout Subil</option><option>Suntex</option><option>Fahne</option><option>Leinwand</option><option>Dekotex Latex</option><option>Backlit Latex</option><option>Blockout Latex</option><option>PVC Frontlit</option><option>PVC Mesh</option><option>Roll-Up Film</option><option>Monomere Folie</option><option>Polymere Folie</option><option>Easy Stick Folie</option><option>Transparente Folie</option><option>Dekotex Satin</option>
      </select>
      <select class="topbar-select" id="filter-stat" onchange="applyFilters()">
        <option>Alle</option>
        <option>Undefiniert</option><option>In Planung</option><option>Im Druck</option><option>Konfektion</option><option>Versand</option><option>Abgeschlossen</option>
      </select>
      <button class="filter-clear-btn hidden" id="clear-btn" onclick="clearFilters()">Filter ×</button>
      <button class="btn btn-primary" onclick="openNewForm()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Neuer Auftrag
      </button>
    </header>

    <div id="content">
      <!-- AUFTRAEGE VIEW -->
      <div id="view-auftraege">
        <div class="page-header">
          <div>
            <div class="page-title">Auftragsübersicht</div>
            <div class="page-sub" id="order-count">7 Aufträge</div>
          </div>
        </div>
        <div class="stats-grid" id="stats-grid"></div>
        <div class="table-wrap">
          <div class="table-scroll">
            <table id="orders-table">
              <thead>
                <tr>
                  <th onclick="sortBy('id')"><span class="th-inner">Auftragsnummer <span id="sort-id">⇅</span></span></th>
                  <th onclick="sortBy('startDate')"><span class="th-inner">Datum <span id="sort-startDate">⇅</span></span></th>
                  <th onclick="sortBy('customer')"><span class="th-inner">Kunde <span id="sort-customer">⇅</span></span></th>
                  <th onclick="sortBy('material')"><span class="th-inner">Material <span id="sort-material">⇅</span></span></th>
                  <th onclick="sortBy('status')"><span class="th-inner">Status <span id="sort-status">⇅</span></span></th>
                  <th onclick="sortBy('druckdaten')"><span class="th-inner">Druckdaten <span id="sort-druckdaten">⇅</span></span></th>
                  <th onclick="sortBy('mengeFormat')"><span class="th-inner">Format <span id="sort-mengeFormat">⇅</span></span></th>
                  <th onclick="sortBy('lieferdatum')"><span class="th-inner">Lieferung <span id="sort-lieferdatum">⇅</span></span></th>
                  <th onclick="sortBy('fixtermin')"><span class="th-inner">Fix <span id="sort-fixtermin">⇅</span></span></th>
                  <th style="text-align:right">Aktionen</th>
                </tr>
              </thead>
              <tbody id="orders-tbody"></tbody>
            </table>
          </div>
          <div class="table-footer" id="table-footer">7 von 7 Aufträgen angezeigt</div>
        </div>
      </div>

