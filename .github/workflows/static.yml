  {id:"AU-2024-0895",startDate:"2024-07-03",customer:"Architekturbüro Ziegler",status:"Im Druck",  material:"Folie",        druckdaten:"Korrektur",  mengeFormat:"3 Stk. 50x200cm", lieferdatum:"2024-07-10",fixtermin:false,machine:"M2",konfektion:{oben:"Kein Saum",unten:"Kein Saum",links:"Kein Saum",rechts:"Kein Saum"},notizen:"Schaufenster-Sichtschutzfolie. Freigabe durch Architekt ausstehend."},
  {id:"AU-2024-0896",startDate:"2024-07-04",customer:"Sportverein Rot-Weiss", status:"In Planung", material:"Blockout",     druckdaten:"Ausstehend", mengeFormat:"6 Stk. 100x80cm", lieferdatum:"2024-07-15",fixtermin:false,machine:"M1",konfektion:{oben:"Gummilippe 12mm",unten:"Gummilippe 12mm",links:"Gummilippe 12mm",rechts:"Gummilippe 12mm"},notizen:"Bandenwerbung Sportstätte. Vollflächig, keine Transparenz."},
  {id:"AU-2024-0897",startDate:"2024-07-05",customer:"Globus SB-Warenhaus",   status:"Abgeschlossen",material:"Dekotex Subli",druckdaten:"Vollständig",mengeFormat:"8 Stk. 200x300cm",lieferdatum:"2024-07-03",fixtermin:true, machine:"M3",konfektion:{oben:"Hohlsaum 50mm",unten:"Gewichtsband",links:"Kein Saum",rechts:"Kein Saum"},notizen:"Sommer-Promotion. Erfolgreich ausgeliefert."},
];

let nextNum = 898;
let archivedOrders = [];
let sortField = "startDate", sortDir = "desc";
let currentTab = "auftraege";
let editingId = null;
let confirmCallback = null;
let detailId = null;
let calYear, calMonth;
