let orders = [
  {id:"AU-2024-0891",startDate:"2024-07-01",customer:"Messe Frankfurt GmbH",  status:"Im Druck",    material:"Dekotex Subli",druckdaten:"Vollständig",mengeFormat:"4 Stk. 300x250cm",lieferdatum:"2024-07-08",fixtermin:true, machine:"M3",konfektion:{oben:"Hohlsaum 50mm",unten:"Gummilippe 12mm",links:"Ösen 50cm Abstand",rechts:"Ösen 50cm Abstand"},notizen:"Rückwand Hauptstand IAA. Farbprofil ISO Coated v2 beachten."},
