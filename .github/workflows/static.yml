// ── HELPERS ────────────────────────────────────────────────────────────────────
const fmtDate  = d => d ? new Date(d+'T00:00:00').toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
const fmtShort = d => d ? new Date(d+'T00:00:00').toLocaleDateString("de-DE",{day:"2-digit",month:"short"}) : "—";
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function matBadge(v) {
  const c = getMatColor(v);
  return `<span class="badge-mat" style="background:${c.bg};color:${c.text};border-color:${c.border}">${esc(v)}</span>`;
}
function statBadge(v) {
  const c = STAT_COLOR[v]||{bg:"#f5f5f5",text:"#333",dot:"#999"};
  return `<span class="badge-stat" style="background:${c.bg};color:${c.text}"><span class="dot" style="background:${c.dot}"></span>${esc(v)}</span>`;
}
function ddBadge(v) {
  const c = DD_COLOR[v]||{bg:"#f5f5f5",text:"#333"};
  return `<span class="badge-dd" style="background:${c.bg};color:${c.text}">${esc(v)}</span>`;
}

// ── TAB SWITCHING ──────────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  ["auftraege","kalender","archiv"].forEach(t => {
    document.getElementById("view-"+t).classList.toggle("hidden", t !== tab);
    const navEl = document.getElementById("nav-"+t);
    if (navEl) navEl.classList.toggle("active", t === tab);
  });
  const searchArea = document.getElementById("search-area");
  const fMat  = document.getElementById("filter-mat");
  const fStat = document.getElementById("filter-stat");
  const clearBtn = document.getElementById("clear-btn");
  const isFiltered = tab === "auftraege";
  searchArea.style.display = isFiltered ? "" : "none";
  fMat.style.display  = isFiltered ? "" : "none";
  fStat.style.display = isFiltered ? "" : "none";
  if (!isFiltered) clearBtn.classList.add("hidden");
  if (tab === "kalender") renderCalendar();
  if (tab === "archiv")   renderArchiv();
}

// ── STATUS NAV ─────────────────────────────────────────────────────────────────
function renderStatusNav() {
  const el = document.getElementById("status-nav");
  const navStats = STATUS_LIST.filter(s => s !== "Abgeschlossen");
  el.innerHTML = navStats.map(s => {
    const c = STAT_COLOR[s] || {dot:"#9CA3AF"};
    const cnt = orders.filter(o => o.status === s).length;
    return `<button class="nav-status-btn" onclick="filterByStatus('${s}')">
      <span class="dot" style="background:${c.dot}"></span>
      <span style="flex:1">${esc(s)}</span>
      <span class="nav-cnt">${cnt}</span>
    </button>`;
  }).join("");
  // Update archiv badge
  const navCnt = document.getElementById("nav-archiv-cnt");
  if (navCnt) navCnt.textContent = archivedOrders.length;
}

function filterByStatus(s) {
  document.getElementById("filter-stat").value = s;
  setTab("auftraege");
  applyFilters();
}

// ── STATS ──────────────────────────────────────────────────────────────────────
function renderStats() {
  const total      = orders.length;
  const imDruck    = orders.filter(o => o.status === "Im Druck").length;
  const fix        = orders.filter(o => o.fixtermin && o.status !== "Abgeschlossen").length;
  const ausstehend = orders.filter(o => o.druckdaten === "Ausstehend").length;
  const cards = [
    {l:"Gesamt",     v:total,      bg:"#F3F4F6",ic:"#374151",icon:"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"},
    {l:"Im Druck",   v:imDruck,    bg:"#EFF6FF",ic:"#1D4ED8",icon:"M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"},
    {l:"Fixtermine", v:fix,        bg:"#FEF2F2",ic:"#DC2626",icon:"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01"},
    {l:"Ausstehend", v:ausstehend, bg:"#FFFBEB",ic:"#92400E",icon:"M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z M7 7h.01"},
  ];
  document.getElementById("stats-grid").innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-icon" style="background:${c.bg}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${c.ic}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${c.icon}"/></svg>
      </div>
      <div><div class="stat-num">${c.v}</div><div class="stat-lbl">${c.l}</div></div>
    </div>`).join("");
  document.getElementById("nav-cnt").textContent = total;
}

// ── TABLE ──────────────────────────────────────────────────────────────────────
function applyFilters() {
  const q    = document.getElementById("search-input").value.toLowerCase();
  const mat  = document.getElementById("filter-mat").value;
  const stat = document.getElementById("filter-stat").value;
  let data = orders.filter(o => {
    const matchQ = !q || o.id.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q) || o.material.toLowerCase().includes(q) || o.status.toLowerCase().includes(q);
    const matchM = mat === "Alle" || o.material === mat;
    const matchS = stat === "Alle" || o.status === stat;
    return matchQ && matchM && matchS;
  });
  data.sort((a,b) => {
    let av = a[sortField]??"", bv = b[sortField]??"";
    if (typeof av === "string") { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    return sortDir === "asc" ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });
  renderTable(data);
  document.getElementById("clear-btn").classList.toggle("hidden", mat === "Alle" && stat === "Alle" && !q);
}

function clearFilters() {
  document.getElementById("search-input").value = "";
  document.getElementById("filter-mat").value = "Alle";
  document.getElementById("filter-stat").value = "Alle";
  applyFilters();
}

function sortBy(field) {
  if (sortField === field) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortField = field; sortDir = "asc"; }
  ["id","startDate","customer","material","status","druckdaten","mengeFormat","lieferdatum","fixtermin"].forEach(f => {
    const el = document.getElementById("sort-"+f);
    if (el) { el.textContent = f === sortField ? (sortDir === "asc" ? "↑" : "↓") : "⇅"; el.style.color = f === sortField ? "#D4006A" : "#D1D5DB"; }
  });
  applyFilters();
}

function renderTable(data) {
  const tbody = document.getElementById("orders-tbody");
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="padding:48px;text-align:center;color:#9CA3AF;font-size:14px;">Keine Aufträge gefunden.</td></tr>`;
    document.getElementById("table-footer").textContent = `0 von ${orders.length} Aufträgen angezeigt`;
    document.getElementById("order-count").textContent = "0 Aufträge";
    return;
  }
  tbody.innerHTML = data.map(o => `
    <tr onclick="openDetail('${o.id}')">
      <td><span class="td-id">${esc(o.auftragsnr || o.id)}</span></td>
      <td><span class="td-date">${fmtShort(o.startDate)}</span></td>
      <td><span class="td-customer">${esc(o.customer)}</span></td>
      <td>${matBadge(o.material)}</td>
      <td>${statBadge(o.status)}</td>
      <td>${ddBadge(o.druckdaten)}</td>
      <td><span class="td-fmt">${esc(o.mengeFormat)}</span></td>
      <td><span style="font-size:12px;font-weight:500;color:${o.fixtermin?"#991B1B":"#374151"};white-space:nowrap">${fmtShort(o.lieferdatum)}</span></td>
      <td style="text-align:center">${o.fixtermin?'<span class="td-fix-y">JA</span>':'<span class="td-fix-n">–</span>'}</td>
      <td style="text-align:right;white-space:nowrap" onclick="event.stopPropagation()">
        <button class="act-btn act-edit" title="Bearbeiten" onclick="openEditForm('${o.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="act-btn act-del" title="Löschen" onclick="askDelete('${o.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
      </td>
    </tr>`).join("");
  document.getElementById("table-footer").textContent = `${data.length} von ${orders.length} Aufträgen angezeigt`;
  document.getElementById("order-count").textContent = `${data.length} Aufträge`;
}

// ── NRW FEIERTAGE ──────────────────────────────────────────────────────────────
function easterSunday(year) {
  const a = year % 19, b = Math.floor(year / 100), c = year % 100;
  const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3), h = (19*a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const l = (32 + 2*e + 2*i - h - k) % 7;
  const m = Math.floor((a + 11*h + 22*l) / 451);
  const month = Math.floor((h + l - 7*m + 114) / 31);
  const day   = ((h + l - 7*m + 114) % 31) + 1;
  return new Date(year, month - 1, day);
}

function getNRWHolidays(year) {
  const easter = easterSunday(year);
  const add = (d, days) => { const r = new Date(d); r.setDate(r.getDate() + days); return r; };
  const fmt  = d => d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  return {
    [year+"-01-01"]: "Neujahr",
    [year+"-01-06"]: "Heilige Drei Könige",
    [year+"-05-01"]: "Tag der Arbeit",
    [year+"-10-03"]: "Tag der Deutschen Einheit",
    [year+"-11-01"]: "Allerheiligen",
    [year+"-12-25"]: "1. Weihnachtstag",
    [year+"-12-26"]: "2. Weihnachtstag",
    [fmt(add(easter,-2))]:  "Karfreitag",
    [fmt(easter)]:           "Ostersonntag",
    [fmt(add(easter, 1))]:  "Ostermontag",
    [fmt(add(easter,39))]:  "Christi Himmelfahrt",
    [fmt(add(easter,49))]:  "Pfingstsonntag",
    [fmt(add(easter,50))]:  "Pfingstmontag",
    [fmt(add(easter,60))]:  "Fronleichnam",
  };
}

// ── CALENDAR ───────────────────────────────────────────────────────────────────
function initCal() {
  const now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function calToday() {
  const now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();
  renderCalendar();
}

function renderCalendar() {
  const MONTHS_DE = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  document.getElementById("cal-month-label").textContent = MONTHS_DE[calMonth] + " " + calYear;

  const today = new Date(); today.setHours(0,0,0,0);

  // NRW Feiertage
  const holidays = Object.assign({}, getNRWHolidays(calYear-1), getNRWHolidays(calYear), getNRWHolidays(calYear+1));

  const firstDay = new Date(calYear, calMonth, 1);
  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();

  // Event map
  const evMap = {};
  const addEv = (ds, type, order) => { if (!evMap[ds]) evMap[ds]=[]; evMap[ds].push({type,order}); };
  orders.forEach(o => {
    if (o.startDate)   addEv(o.startDate,   "start", o);
    if (o.lieferdatum) addEv(o.lieferdatum, o.fixtermin ? "fix" : "liefer", o);
  });

  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
  let html = "";

  for (let i = 0; i < totalCells; i++) {
    let day, month = calMonth, year = calYear, isOther = false;
    if (i < startOffset) {
      day = daysInPrev - startOffset + 1 + i;
      month = calMonth - 1; if (month < 0) { month = 11; year--; }
      isOther = true;
    } else if (i - startOffset >= daysInMonth) {
      day = i - startOffset - daysInMonth + 1;
      month = calMonth + 1; if (month > 11) { month = 0; year++; }
      isOther = true;
    } else {
      day = i - startOffset + 1;
    }

    const cellDate = new Date(year, month, day); cellDate.setHours(0,0,0,0);
    const isToday   = cellDate.getTime() === today.getTime();
    const isSat     = cellDate.getDay() === 6;
    const isSun     = cellDate.getDay() === 0;
    const dateStr   = year + "-" + String(month+1).padStart(2,"0") + "-" + String(day).padStart(2,"0");
    const holiday   = holidays[dateStr];

    let cellStyle = "";
    if (holiday && !isOther) cellStyle = 'style="background:#FFF5F5;"';
    let cellClass = "cal-cell" + (isOther?" other-month":"") + (isToday?" today":"");

    let dayStyle = (isSat || isSun || (holiday && !isOther)) ? "color:#DC2626;" : "";

    let evHtml = "";
    // Holiday label
    if (holiday && !isOther) {
      evHtml += '<span class="cal-holiday">' + esc(holiday) + '</span>';
    }

    // Order events
    const events = evMap[dateStr] || [];
    const MAX_SHOW = holiday ? 2 : 3;
    const shown = events.slice(0, MAX_SHOW);
    const extra = events.length - MAX_SHOW;

    evHtml += shown.map(ev => {
      let bg, textCol, border;
      if (ev.type === "fix")         { bg="#FEF2F2"; textCol="#991B1B"; border="#EF4444"; }
      else if (ev.type === "liefer") { bg="#FFFBEB"; textCol="#92400E"; border="#F59E0B"; }
      else                           { bg="#EFF6FF"; textCol="#1D4ED8"; border="#3B82F6"; }
      const label = ev.type === "start" ? "&#x2191; " + ev.order.customer : "&#x2713; " + ev.order.customer;
      return '<span class="cal-event" style="background:' + bg + ';color:' + textCol + ';border-left-color:' + border + '" title="' + esc(ev.order.customer) + '" onclick="showEventPopup(event,\'' + ev.order.id + '\')">' + label + '</span>';
    }).join("");

    if (extra > 0) evHtml += '<span class="cal-more">+' + extra + ' mehr</span>';

    html += '<div class="' + cellClass + '" ' + cellStyle + '>';
    html += '<span class="cal-day-num" style="' + dayStyle + '">' + day + '</span>';
    html += evHtml + '</div>';
  }

  document.getElementById("cal-grid").innerHTML = html;
}

// ── EVENT POPUP ────────────────────────────────────────────────────────────────
function showEventPopup(e, orderId) {
  e.stopPropagation();
  const o = orders.find(x => x.id === orderId);
  if (!o) return;
  popupOrderId = orderId;
  const popup = document.getElementById("event-popup");
  document.getElementById("popup-title").textContent = o.customer;
  document.getElementById("popup-body").innerHTML = [
    {l:"Auftrag",   v:`<span style="font-family:monospace;font-size:11px;color:#D4006A;background:#FFF0F7;padding:1px 6px;border-radius:3px">${esc(o.id)}</span>`},
    {l:"Status",    v:statBadge(o.status)},
    {l:"Material",  v:matBadge(o.material)},
    {l:"Format",    v:esc(o.mengeFormat)},
    {l:"Lieferung", v:`<span style="font-weight:600;color:${o.fixtermin?"#991B1B":"#374151"}">${fmtDate(o.lieferdatum)}${o.fixtermin?" (FIXTERMIN)":""}</span>`},
  ].map(r=>`<div class="event-popup-row"><span class="event-popup-lbl">${r.l}</span><span class="event-popup-val">${r.v}</span></div>`).join("");

  // Position popup near click
  popup.classList.remove("hidden");
  const rect = popup.getBoundingClientRect();
  let left = e.clientX + 10;
  let top  = e.clientY + 10;
  if (left + 300 > window.innerWidth)  left = e.clientX - 310;
  if (top  + rect.height > window.innerHeight) top = e.clientY - rect.height - 10;
  popup.style.left = left + "px";
  popup.style.top  = top  + "px";
}

function closePopup() {
  document.getElementById("event-popup").classList.add("hidden");
  popupOrderId = null;
}

function openDetailFromPopup() {
  closePopup();
  if (popupOrderId) openDetail(popupOrderId);
}

// Close popup when clicking elsewhere
document.addEventListener("click", e => {
  const popup = document.getElementById("event-popup");
  if (!popup.classList.contains("hidden") && !popup.contains(e.target)) closePopup();
});

